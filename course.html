<!DOCTYPE html>
<html lang="en">
<head>

<title>Mecknown Courses | Robotics & AI Learning</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- SEO -->
<meta name="description" content="Learn robotics, AI, and embedded systems with Mecknown courses. Watch recorded classes and improve your technical skills.">
<meta name="keywords" content="robotics course, AI course, embedded systems learning, Mecknown academy, tech education">
<meta name="author" content="Mecknown">
<link rel="canonical" href="https://mecknown.in/course">

<!-- Open Graph -->
<meta property="og:title" content="Mecknown Courses">
<meta property="og:description" content="Learn robotics, AI and embedded systems with structured courses.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://mecknown.in/course">
<meta property="og:image" content="https://mecknown.in/assets/logo.png">

<link rel="stylesheet" href="style.css">
<link rel="icon" href="favicon.ico">

<style>

/* ===== PAGE FIX ===== */
.container{
  padding:100px 6% 60px;
  max-width:1200px;
  margin:auto;
}

/* HEADER */
.page-header{
  text-align:center;
  margin-bottom:30px;
}

.page-header h1{
  font-size:32px;
}

.page-header p{
  color:#9ca3af;
  margin-top:10px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

/* CARD (MATCH STYLE.CSS) */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:15px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-6px);
  border-color:#2a2a2a;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* VIDEO */
iframe{
  width:100%;
  height:180px;
  border:none;
  border-radius:10px;
  margin-top:10px;
}

</style>

</head>

<body>

<!-- LOADER -->
<div id="loader">
  <img src="assets/logo.png" alt="Loading" class="loader-logo">
</div>

<!-- NAVBAR -->
<nav>
  <h1>Mecknown</h1>

  <div class="menu-toggle" id="menu-toggle">
    <span></span><span></span><span></span>
  </div>

  <ul id="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="ai.html">Meck AI</a></li>
    <li><a href="course.html" class="active">Course</a></li>
    <li><a href="shop.html">Shop</a></li>
    <li><a href="services.html">Services</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<!-- CONTENT -->
<div class="container">

  <div class="page-header">
    <h1>Course Library</h1>
    <p>Learn robotics, AI and embedded systems</p>
  </div>

  <div class="grid" id="videoList"></div>

</div>

<footer>
© 2026 Mecknown. All Rights Reserved.
</footer>

<script>

/* ===== LOADER ===== */
window.addEventListener("load", function () {
  const loader = document.getElementById("loader");

  if (loader) {
    document.body.style.overflow = "hidden";

    setTimeout(() => loader.style.opacity = "0", 100);

    setTimeout(() => {
      loader.style.display = "none";
      document.body.style.overflow = "auto";
    }, 500);
  }
});

/* ===== MENU ===== */
const toggle = document.getElementById("menu-toggle");
const navLinks = document.getElementById("nav-links");

if(toggle){
  toggle.addEventListener("click", function(){
    navLinks.classList.toggle("active");
    toggle.classList.toggle("active");
  });
}

/* ===== LOAD VIDEOS ===== */
fetch("data/class.json")
.then(res => res.json())
.then(data => {

  const container = document.getElementById("videoList");

  data.classes.forEach(c => {
    container.innerHTML += `
      <div class="card">
        <h3>${c.title}</h3>
        <iframe 
          src="https://www.youtube.com/embed/${c.video}?modestbranding=1&rel=0"
          loading="lazy"
          allowfullscreen>
        </iframe>
      </div>
    `;
  });

});

</script>

</body>
</html>
