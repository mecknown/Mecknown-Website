<!DOCTYPE html>
<html lang="en">
<head>

<title>Contact Mecknown | Robotics & AI Services</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- SEO -->
<meta name="description" content="Contact Mecknown for robotics, AI, and development services. Let's build something powerful together.">
<meta name="keywords" content="contact Mecknown, robotics company, AI services, tech support">
<meta name="author" content="Mecknown">
<link rel="canonical" href="https://mecknown.in/contact">

<link rel="stylesheet" href="style.css">
<link rel="icon" href="favicon.ico">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<style>

/* ===== LAYOUT ===== */
.container{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:100px 20px 60px;
}

/* CARD */
.card{
  width:100%;
  max-width:420px;
  padding:25px;
  border-radius:16px;

  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(20px);
  border:1px solid var(--border);

  box-shadow:0 20px 40px rgba(0,0,0,0.6);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

/* TEXT */
h2{
  text-align:center;
  margin-bottom:20px;
}

.top-info{
  text-align:center;
  color:var(--muted);
  margin-bottom:10px;
}

.logout{
  color:#ef4444;
  cursor:pointer;
  font-size:12px;
}

/* INPUT */
input,textarea{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid var(--border);
  background:#0f0f0f;
  color:#fff;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
}

.primary{
  background:#fff;
  color:#000;
}

.google{
  background:#fff;
  color:#000;
}

.hidden{display:none}

.loading-btn{
  opacity:0.6;
  pointer-events:none;
}

</style>

</head>

<body>
  

<!-- GLOBAL NAVBAR -->
<div id="navbar"></div>

<!-- LOADER -->
<div id="loader">
  <img src="assets/logo.png" class="loader-logo">
</div>

<div class="container">

  <!-- LOGIN -->
  <div id="loginCard" class="card fade-in">
    <h2>Sign in to Contact</h2>

    <input id="loginEmail" placeholder="Email">
    <input id="loginPass" type="password" placeholder="Password">

    <button class="primary" onclick="emailLogin(this)">Login / Signup</button>
    <button class="google" onclick="googleLogin(this)">Continue with Google</button>
  </div>

  <!-- CONTACT -->
  <div id="contactCard" class="card hidden fade-in">
    <div id="userInfo" class="top-info"></div>

    <h2>Contact Us</h2>

    <form id="contactForm">
      <input name="name" placeholder="Your Name" required>
      <input name="email" id="userEmail" required>
      <textarea name="message" rows="4" placeholder="Your Message"></textarea>
      <button id="submitBtn" class="primary">Send Message</button>
    </form>
  </div>

</div>

<footer>
© 2026 Mecknown. All Rights Reserved.
</footer>

<script>

/* ===== LOAD NAVBAR ===== */
fetch("navbar.html")
.then(res => res.text())
.then(data => {
  document.getElementById("navbar").innerHTML = data;

  const toggle = document.getElementById("menu-toggle");
  const navLinks = document.getElementById("nav-links");

  if(toggle){
    toggle.addEventListener("click", ()=>{
      navLinks.classList.toggle("active");
    });
  }

  const current = location.pathname.split("/").pop().replace(".html","");
  document.querySelectorAll("#nav-links a").forEach(link=>{
    if(link.dataset.page === current){
      link.classList.add("active");
    }
  });
});

/* ===== LOADER ===== */
window.onload = ()=>{
  const loader=document.getElementById("loader");
  setTimeout(()=>{
    loader.style.opacity="0";
    setTimeout(()=>loader.style.display="none",400);
  },200);
};

/* ===== FIREBASE (UNCHANGED) ===== */
try{
  firebase.initializeApp({
    apiKey:"AIzaSyDyh1Bi_29TpEG-_N3QijtxB7rdjLdHy3M",
    authDomain:"mecknownshop.firebaseapp.com",
    projectId:"mecknownshop"
  });
}catch{}

const auth=firebase.auth();

auth.onAuthStateChanged(user=>{
  if(user){
    loginCard.classList.add("hidden");
    contactCard.classList.remove("hidden");

    userInfo.innerHTML=
      `👤 ${user.email} <div class='logout' onclick='logout()'>Logout</div>`;

    userEmail.value=user.email;
    userEmail.readOnly=true;
  }
});

function emailLogin(btn){
  btn.classList.add("loading-btn");

  const email=loginEmail.value;
  const pass=loginPass.value;

  if(!email||!pass){
    alert("Fill fields");
    btn.classList.remove("loading-btn");
    return;
  }

  auth.signInWithEmailAndPassword(email,pass)
  .catch(()=>auth.createUserWithEmailAndPassword(email,pass))
  .finally(()=>btn.classList.remove("loading-btn"));
}

function googleLogin(btn){
  btn.classList.add("loading-btn");
  const provider=new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).finally(()=>btn.classList.remove("loading-btn"));
}

function logout(){
  auth.signOut();
  location.reload();
}

/* ===== FORM ===== */
let sending=false;

contactForm.addEventListener("submit",e=>{
  e.preventDefault();
  if(sending)return;

  sending=true;
  submitBtn.innerText="Sending...";
  submitBtn.classList.add("loading-btn");

  const fd=new FormData(e.target);
  fd.append("sheet","Contact");

  fetch("https://script.google.com/macros/s/AKfycbz4NzPug47y38qVTu9LiDLwp2a9X6J7Iygmq5qQUktEUjyEKp5R7FG5L_0XhMfFApVI/exec",{
    method:"POST",
    body:fd
  })
  .then(()=>alert("Message sent"))
  .catch(()=>alert("Error"))
  .finally(()=>{
    sending=false;
    submitBtn.innerText="Send Message";
    submitBtn.classList.remove("loading-btn");
  });
});

/* ===== SCROLL ANIMATION ===== */
const observer=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting) e.target.classList.add("show");
  });
},{threshold:0.2});

document.querySelectorAll(".fade-in").forEach(el=>observer.observe(el));

/* LOAD NAVBAR */
fetch("navbar.html")
.then(res => res.text())
.then(data => {
  document.getElementById("navbar").innerHTML = data;

  /* MENU TOGGLE */
  const toggle = document.getElementById("menu-toggle");
  const navLinks = document.getElementById("nav-links");

  if(toggle){
    toggle.addEventListener("click", function(){
      navLinks.classList.toggle("active");
      toggle.classList.toggle("active");
    });
  }

  /* ACTIVE LINK AUTO */
  const current = location.pathname.split("/").pop().replace(".html","");

  document.querySelectorAll("#nav-links a").forEach(link=>{
    if(link.dataset.page === current){
      link.classList.add("active");
    }
  });

});


</script>

</body>
</html>
