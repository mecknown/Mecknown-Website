<!DOCTYPE html>
<html>
<head>
<title>Dashboard - Mecknown</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<link rel="icon" href="favicon.ico">
</head>
<body>

<div class="dashboard">
<h2>Project Dashboard</h2>

<form id="projectForm">
<input type="text" id="title" placeholder="Project Title" required>
<textarea id="description" placeholder="Project Description" required></textarea>

<input type="url" id="link" placeholder="Project Link (GitHub / Demo)">

<label>Upload Image</label>
<input type="file" id="image" accept="image/*">

<label>Upload Video</label>
<input type="file" id="video" accept="video/*">

<button type="submit">Add Project</button>
</form>

<div id="projects"></div>

</div>

<script>
function escapeHtml(value){
return String(value ?? "")
  .replace(/&/g, "&amp;")
  .replace(/</g, "&lt;")
  .replace(/>/g, "&gt;")
  .replace(/"/g, "&quot;")
  .replace(/'/g, "&#39;");
}

function safeUrl(value){
if(!value) return "";
try{
const parsed = new URL(value, window.location.origin);
if(parsed.protocol === "http:" || parsed.protocol === "https:"){
return parsed.href;
}
}catch(_e){}
return "";
}

/* Protect Page */
if(localStorage.getItem("adminLoggedIn") !== "true"){
window.location.href = "admin.html";
}

function convertToBase64(file){
return new Promise((resolve,reject)=>{
const reader = new FileReader();
reader.readAsDataURL(file);
reader.onload = () => resolve(reader.result);
reader.onerror = error => reject(error);
});
}

async function loadProjects(){
const projects = JSON.parse(localStorage.getItem("projects")) || [];
const container = document.getElementById("projects");
container.innerHTML = "";

projects.forEach((proj,index)=>{
const title = escapeHtml(proj.title);
const description = escapeHtml(proj.description);
const image = safeUrl(proj.image);
const video = safeUrl(proj.video);
const link = safeUrl(proj.link);

container.innerHTML += `
<div class="project-card">
<h3>${title}</h3>
<p>${description}</p>

${image ? `<img src="${image}" style="width:100%;margin-top:10px;border-radius:10px;">` : ""}

${video ? `<video controls style="width:100%;margin-top:10px;border-radius:10px;">
<source src="${video}">
</video>` : ""}

${link ? `<p><a href="${link}" target="_blank" rel="noopener noreferrer" style="color:#00ffff;">View Project</a></p>` : ""}

<button onclick="deleteProject(${index})">Delete</button>
</div>
`;
});
}

function deleteProject(index){
let projects = JSON.parse(localStorage.getItem("projects")) || [];
projects.splice(index,1);
localStorage.setItem("projects", JSON.stringify(projects));
loadProjects();
}

document.getElementById("projectForm").addEventListener("submit", async function(e){
e.preventDefault();

const title = document.getElementById("title").value;
const description = document.getElementById("description").value;
const link = document.getElementById("link").value;
const imageFile = document.getElementById("image").files[0];
const videoFile = document.getElementById("video").files[0];

let imageBase64 = "";
let videoBase64 = "";

if(imageFile){
imageBase64 = await convertToBase64(imageFile);
}

if(videoFile){
videoBase64 = await convertToBase64(videoFile);
}

let projects = JSON.parse(localStorage.getItem("projects")) || [];

projects.push({
title,
description,
link,
image:imageBase64,
video:videoBase64
});

localStorage.setItem("projects", JSON.stringify(projects));

this.reset();
loadProjects();
});

loadProjects();

</script>


<script>
const toggle = document.getElementById("menu-toggle");
const navLinks = document.getElementById("nav-links");

if(toggle && navLinks){
  toggle.addEventListener("click", function(){
    navLinks.classList.toggle("active");
    toggle.classList.toggle("active");
  });
}
</script>

</body>
</html>
