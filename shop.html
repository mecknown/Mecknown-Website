<!DOCTYPE html>
<html>
<head>
<title>Mecknown Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<link rel="icon" href="favicon.ico">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <h1>Mecknown</h1>

  <input type="text" id="searchBar" placeholder="Search products...">

  <div class="menu-toggle" id="menu-toggle">
    <span></span><span></span><span></span>
  </div>

  <ul id="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="shop.html" class="active">Shop</a></li>
    <li><a href="services.html">Services</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<!-- HERO -->
<section class="hero">
  <h2>⚡ Mecknown Store</h2>
  <p>Smart gadgets • Robotics • Tech builds</p>
</section>

<section class="section">

<!-- LOGIN -->
<div id="loginSection" class="login-box">
  <button id="google-login-btn">Sign in with Google</button>
  <div style="margin-top:12px;">
    <input type="email" id="email-input" placeholder="Email" style="width:100%;margin-bottom:8px;">
    <input type="password" id="password-input" placeholder="Password" style="width:100%;">
    <div style="display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap;">
      <button id="email-login-btn">Login with Email</button>
      <button id="email-signup-btn">Create Account</button>
    </div>
  </div>
</div>

<!-- SHOP -->
<div id="shopSection" style="display:none;">
  <div class="shop-header">
    <p id="userInfo"></p>

    <!-- ADMIN BUTTON -->
    <button id="add-product-btn">+ Add Product</button>

    <button id="logout-btn">Logout</button>
  </div>

  <div class="shop-grid" id="productContainer"></div>
</div>

<div id="phone-modal" style="display:none;">
  <h3>Enter Phone Number</h3>
  <input type="text" id="phone-input" placeholder="Phone number">
  <button id="save-phone">Save</button>
</div>

</section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  onAuthStateChanged,
  signInWithPopup,
  signOut,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
import {
  getFirestore,
  collection,
  addDoc,
  doc,
  getDoc,
  onSnapshot,
  orderBy,
  query,
  serverTimestamp,
  setDoc
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

function escapeHtml(value){
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/\"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function safeUrl(value){
  if(!value) return "";
  try{
    const parsed = new URL(value, window.location.origin);
    if(parsed.protocol === "http:" || parsed.protocol === "https:"){
      return parsed.href;
    }
  }catch(_e){}
  return "";
}

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyDyh1Bi_29TpEG-_N3QijtxB7rdjLdHy3M",
  authDomain: "mecknownshop.firebaseapp.com",
  projectId: "mecknownshop"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore();

/* 🔐 ADMIN EMAIL */
const ADMIN_EMAIL = "shazamotp@gmail.com";
const addProductBtn = document.getElementById("add-product-btn");
const googleLoginBtn = document.getElementById("google-login-btn");
const emailLoginBtn = document.getElementById("email-login-btn");
const emailSignupBtn = document.getElementById("email-signup-btn");
const logoutBtn = document.getElementById("logout-btn");
const emailInput = document.getElementById("email-input");
const passwordInput = document.getElementById("password-input");
const loginSection = document.getElementById("loginSection");
const shopSection = document.getElementById("shopSection");
const userInfo = document.getElementById("userInfo");
const container = document.getElementById("productContainer");
const phoneModal = document.getElementById("phone-modal");
const phoneInput = document.getElementById("phone-input");
const savePhoneBtn = document.getElementById("save-phone");
const productsRef = collection(db, "products");

/* LOGIN */
function googleLogin(){
  const provider = new GoogleAuthProvider();
  signInWithPopup(auth, provider);
}

function emailLogin(){
  const email = emailInput.value.trim();
  const password = passwordInput.value;

  if(!email || !password){
    alert("Please enter email and password.");
    return;
  }

  signInWithEmailAndPassword(auth, email, password)
    .catch(() => alert("Login failed. Please check your credentials."));
}

function emailSignup(){
  const email = emailInput.value.trim();
  const password = passwordInput.value;

  if(!email || !password){
    alert("Please enter email and password.");
    return;
  }

  createUserWithEmailAndPassword(auth, email, password)
    .catch(() => alert("Account creation failed."));
}

async function ensureUserProfile(user){
  const userRef = doc(db, "users", user.uid);
  const userSnap = await getDoc(userRef);

  if(!userSnap.exists()){
    phoneModal.style.display = "block";
  }else{
    phoneModal.style.display = "none";
    console.log("User exists:", userSnap.data());
  }
}

/* AUTH STATE + ADMIN BUTTON VISIBILITY */
onAuthStateChanged(auth, async (user) => {
  if(user){
    loginSection.style.display = "none";
    shopSection.style.display = "block";
    userInfo.innerText = "👤 " + user.email;
    await ensureUserProfile(user);

    if(user.email === ADMIN_EMAIL){
      addProductBtn.style.display = "block";
    }else{
      addProductBtn.style.display = "none";
    }
  }else{
    loginSection.style.display = "block";
    shopSection.style.display = "none";
    addProductBtn.style.display = "none";
    phoneModal.style.display = "none";
  }
});

/* LOGOUT */
function logout(){
  signOut(auth);
}

/* 🔥 LOAD PRODUCTS (FIRESTORE LIVE) */
function loadProducts(){
  const productsQuery = query(productsRef, orderBy("createdAt", "desc"));

  onSnapshot(productsQuery, (snapshot) => {
    container.innerHTML = "";

    if(snapshot.empty){
      container.innerHTML = "<p>No products available yet.</p>";
      return;
    }

    snapshot.forEach((doc) => {
      const product = doc.data() || {};
      const name = escapeHtml(product.name);
      const description = escapeHtml(product.description);
      const price = Number(product.price);
      const safePrice = Number.isFinite(price) ? price : 0;
      const image = safeUrl(product.image);

      container.innerHTML += `
        <div class="product-card">
          <span class="badge">NEW</span>

          <img src="${image}" alt="${name}">

          <h3>${name}</h3>

          <div class="rating">⭐⭐⭐⭐☆</div>

          <p>${description}</p>

          <div class="price-row">
            <span class="price">₹${safePrice}</span>
            <button class="buy-btn" data-name="${name}" data-price="${safePrice}">
              Buy
            </button>
          </div>
        </div>
      `;
    });
  });
}

/* ➕ ADD PRODUCT (ADMIN ONLY) */
async function addProduct(){
  if(!auth.currentUser || auth.currentUser.email !== ADMIN_EMAIL){
    alert("Access denied");
    return;
  }

  const name = prompt("Product name:");
  const price = prompt("Price:");
  const image = prompt("Image URL:");
  const description = prompt("Description:");

  if(!name || !price) return;

  await addDoc(productsRef, {
    name,
    price,
    image,
    description,
    createdAt: serverTimestamp()
  });

  alert("✅ Product Added!");
}

/* 🛒 ORDER */
function placeOrder(name, price){
  const user = auth.currentUser;
  if(!user){
    alert("Please sign in to place an order.");
    return;
  }

  const formData = new FormData();
  formData.append("email", user.email);
  formData.append("product", name);
  formData.append("price", price);

  fetch("https://script.google.com/macros/s/AKfycbwYlsLWQZkH3iGed2VA3hWk63gw8mn559sI-iLNR-uzD6UXXlLkirN2DkJMdVLzoniMPA/exec", {
    method: "POST",
    body: formData
  })
  .then(() => alert("Order placed!"))
  .catch(() => alert("Order failed"));
}

/* 🔍 SEARCH */
const searchBar = document.getElementById("searchBar");
if(searchBar){
  searchBar.addEventListener("input", function(){
    const value = this.value.toLowerCase();
    const cards = document.querySelectorAll(".product-card");

    cards.forEach((card) => {
      const text = card.innerText.toLowerCase();
      card.style.display = text.includes(value) ? "block" : "none";
    });
  });
}

/* MOBILE MENU */
const toggle = document.getElementById("menu-toggle");
const navLinks = document.getElementById("nav-links");

if(toggle && navLinks){
  toggle.addEventListener("click", function(){
    navLinks.classList.toggle("active");
    toggle.classList.toggle("active");
  });
}

if(googleLoginBtn){
  googleLoginBtn.addEventListener("click", googleLogin);
}

if(emailLoginBtn){
  emailLoginBtn.addEventListener("click", emailLogin);
}

if(emailSignupBtn){
  emailSignupBtn.addEventListener("click", emailSignup);
}

if(addProductBtn){
  addProductBtn.addEventListener("click", addProduct);
}

if(logoutBtn){
  logoutBtn.addEventListener("click", logout);
}

if(container){
  container.addEventListener("click", (event) => {
    const buyBtn = event.target.closest(".buy-btn");
    if(!buyBtn) return;
    placeOrder(buyBtn.dataset.name || "", buyBtn.dataset.price || "0");
  });
}

if(savePhoneBtn){
  savePhoneBtn.addEventListener("click", async () => {
    const phone = phoneInput.value.trim();
    const user = auth.currentUser;

    if(!phone){
      alert("Enter phone number");
      return;
    }

    if(!user){
      alert("You are not logged in.");
      return;
    }

    await setDoc(doc(db, "users", user.uid), {
      name: user.displayName || "",
      email: user.email || "",
      phone,
      createdAt: new Date()
    });

    phoneModal.style.display = "none";
    phoneInput.value = "";
    alert("User saved!");
  });
}

loadProducts();
</script>

</body>
</html>
