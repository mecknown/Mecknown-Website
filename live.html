<!DOCTYPE html>
<html lang="en">
<head>

<title>Live Classes | Mecknown Academy</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- SEO -->
<meta name="description" content="Join live robotics and AI classes from Mecknown Academy. Stay updated with real-time learning sessions.">
<meta name="keywords" content="live class robotics, AI live session, Mecknown live class, online tech learning">
<meta name="author" content="Mecknown">
<link rel="canonical" href="https://mecknown.in/live">

<!-- Open Graph -->
<meta property="og:title" content="Live Classes - Mecknown">
<meta property="og:description" content="Join live sessions and learn robotics & AI.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://mecknown.in/live">
<meta property="og:image" content="https://mecknown.in/assets/logo.png">

<link rel="stylesheet" href="style.css">
<link rel="icon" href="favicon.ico">

<style>

/* ===== CONTAINER ===== */
.container{
  max-width:900px;
  margin:auto;
  padding:100px 20px 60px;
  text-align:center;
}

/* HEADER */
.container h1{
  margin-bottom:10px;
}

.subtitle{
  color:#9ca3af;
  margin-bottom:25px;
}

/* CARD */
.live-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
  transition:0.3s;
}

.live-card:hover{
  transform:translateY(-5px);
}

/* VIDEO */
.video-box{
  position:relative;
  padding-top:56.25%;
  border-radius:12px;
  overflow:hidden;
}

.video-box iframe{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  border:none;
}

/* STATUS */
.status{
  margin-top:12px;
  color:#9ca3af;
}

/* LIVE BADGE */
.badge{
  display:inline-block;
  background:#ef4444;
  color:#fff;
  padding:4px 10px;
  border-radius:8px;
  font-size:12px;
  margin-left:8px;
  box-shadow:0 0 10px rgba(239,68,68,0.5);
}

</style>

</head>

<body>

<!-- LOADER -->
<div id="loader">
  <img src="assets/logo.png" alt="Loading" class="loader-logo">
</div>

<!-- NAVBAR -->
<nav>
  <h1>Mecknown</h1>

  <div class="menu-toggle" id="menu-toggle">
    <span></span><span></span><span></span>
  </div>

  <ul id="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="ai.html">Meck AI</a></li>
    <li><a href="course.html">Course</a></li>
    <li><a href="live.html" class="active">Live</a></li>
    <li><a href="shop.html">Shop</a></li>
    <li><a href="services.html">Services</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<div class="container">

<h1>Live Class</h1>
<p class="subtitle">Join your scheduled session</p>

<div class="live-card">
  <div class="video-box" id="liveBox"></div>
  <div class="status" id="status">Checking schedule...</div>
</div>

</div>

<footer>
© 2026 Mecknown. All Rights Reserved.
</footer>

<script>

/* ===== LOADER ===== */
window.addEventListener("load", function () {
  const loader = document.getElementById("loader");

  if (loader) {
    document.body.style.overflow = "hidden";

    setTimeout(() => loader.style.opacity = "0", 100);

    setTimeout(() => {
      loader.style.display = "none";
      document.body.style.overflow = "auto";
    }, 500);
  }
});

/* ===== MENU ===== */
const toggle = document.getElementById("menu-toggle");
const navLinks = document.getElementById("nav-links");

if(toggle){
  toggle.addEventListener("click", function(){
    navLinks.classList.toggle("active");
    toggle.classList.toggle("active");
  });
}

/* ===== LIVE SYSTEM ===== */
fetch("data/class.json")
.then(res => res.json())
.then(data => {

  const liveBox = document.getElementById("liveBox");
  const status = document.getElementById("status");

  if(!data.live || !data.live.id || !data.live.time){
    status.innerText = "No live class scheduled";
    return;
  }

  const now = new Date().getTime();
  const start = new Date(data.live.time).getTime();

  if(now >= start){
    liveBox.innerHTML = `
      <iframe
        src="https://www.youtube.com/embed/${data.live.id}?modestbranding=1&rel=0&fs=1&playsinline=1"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    `;
    status.innerHTML = "Live Now <span class='badge'>LIVE</span>";
  }else{
    const diff = start - now;
    const mins = Math.floor(diff/60000);
    status.innerText = `Starts in ${mins} minutes`;
  }

});

</script>

</body>
</html>
