<!DOCTYPE html>
<html lang="en">
<head>

<title>Meck AI | Smart AI Assistant by Mecknown</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- SEO -->
<meta name="description" content="Use Meck AI – an intelligent AI assistant built by Mecknown. Fast, smart and responsive AI for learning, building and innovation.">
<meta name="keywords" content="AI assistant, Meck AI, chatbot, artificial intelligence, Mecknown AI">
<meta name="author" content="Mecknown">
<link rel="canonical" href="https://mecknown.in/ai">

<!-- Open Graph -->
<meta property="og:title" content="Meck AI - Mecknown">
<meta property="og:description" content="Smart AI assistant for real-world innovation.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://mecknown.in/ai">
<meta property="og:image" content="https://mecknown.in/assets/logo.png">

<link rel="stylesheet" href="style.css">
<link rel="icon" href="favicon.ico">

<style>

/* KEEP YOUR ORIGINAL + IMPROVED */
.ai-container{
  position:relative;
  height: calc(100dvh - 110px);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.ai-frame{
  flex:1;
  width:100%;
  height:100%;
  border:none;
  display:block;
}

/* STATUS BAR (MATCH STYLE.CSS) */
.ai-status{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 6%;
  background:rgba(10,10,10,0.7);
  backdrop-filter:blur(12px);
  border-bottom:1px solid #1f1f1f;
  font-size:13px;
  color:#9ca3af;
}

#status-indicator{
  width:10px;
  height:10px;
  border-radius:50%;
}

.offline{
  background:#ef4444;
  box-shadow:0 0 8px rgba(239,68,68,0.6);
}

.online{
  background:#22c55e;
  box-shadow:0 0 8px rgba(34,197,94,0.6);
}

/* LOADING OVERLAY (IMPROVED) */
.ai-overlay{
  position:absolute;
  inset:0;
  background:#0a0a0a;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:10;
  font-size:14px;
  color:#9ca3af;
  gap:12px;
  text-align:center;
}

.ai-overlay::after{
  content:"";
  width:25px;
  height:25px;
  border:3px solid #222;
  border-top:3px solid #fff;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

</style>

</head>

<body>

<!-- LOADER (MATCH INDEX) -->
<div id="loader">
  <img src="assets/logo.png" alt="Mecknown Loading" class="loader-logo">
</div>

<!-- NAVBAR -->
<nav>
  <h1>Mecknown</h1>
  <div class="menu-toggle" id="menu-toggle">
    <span></span><span></span><span></span>
  </div>
  <ul id="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="ai.html" class="active">Meck AI</a></li>
    <li><a href="course.html">Course</a></li>
    <li><a href="shop.html">Shop</a></li>
    <li><a href="services.html">Services</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<!-- STATUS -->
<div class="ai-status">
  <span id="status-indicator" class="offline"></span>
  <span id="status-text">Starting AI, please wait...</span>
</div>

<!-- AI SECTION -->
<div class="ai-container">

  <!-- OVERLAY -->
  <div class="ai-overlay" id="ai-overlay">
    <p>🚀 Initializing Meck AI...</p>
    <small>Optimizing connection...</small>
  </div>

  <!-- IFRAME -->
  <iframe 
    src="https://www.meckai.mecknown.in/"
    class="ai-frame"
    id="ai-frame"
    loading="lazy"
  ></iframe>

</div>

<script>

/* ===== LOADER (MATCH INDEX) ===== */
window.addEventListener("load", function () {
  const loader = document.getElementById("loader");

  if (loader) {
    document.body.style.overflow = "hidden";

    setTimeout(() => {
      loader.style.opacity = "0";
    }, 100);

    setTimeout(() => {
      loader.style.display = "none";
      document.body.style.overflow = "auto";
    }, 500);
  }
});

/* ===== MOBILE MENU ===== */
const toggle = document.getElementById("menu-toggle");
const navLinks = document.getElementById("nav-links");

if(toggle){
  toggle.addEventListener("click", function(){
    navLinks.classList.toggle("active");
    toggle.classList.toggle("active");
  });
}

/* ===== AI STATUS SYSTEM ===== */
const iframe = document.getElementById("ai-frame");
const overlay = document.getElementById("ai-overlay");
const statusText = document.getElementById("status-text");
const statusIndicator = document.getElementById("status-indicator");

/* Load success */
iframe.addEventListener("load", () => {
  overlay.style.display = "none";

  statusText.innerText = "AI is Online";
  statusIndicator.classList.remove("offline");
  statusIndicator.classList.add("online");
});

/* Fail-safe (if server slow) */
setTimeout(() => {
  if(overlay.style.display !== "none"){
    statusText.innerText = "Connecting to AI server...";
  }
}, 4000);

/* Extra fallback */
setTimeout(() => {
  if(overlay.style.display !== "none"){
    statusText.innerText = "Server may be waking up (Render delay)...";
  }
}, 8000);

</script>

</body>
</html>
